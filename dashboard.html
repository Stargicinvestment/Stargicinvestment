<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
}

.container{
  padding:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

.balance{
  color:#00ff9d;
  font-size:40px;
}

.actions{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.deposit{
  background:#00e676;
  color:#000;
}

.withdraw{
  background:#ff5252;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">
  <h2>Investor Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <h2 id="welcome">Welcome</h2>

  <div class="card">
    <p data-key="balance">Your Balance</p>
<button data-key="deposit">Deposit</button>
<button data-key="withdraw">Withdraw</button>

    <h3 style="margin-top:30px;">Transaction History</h3>
    <div id="history"></div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.appspot.com",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ LOAD USER DATA
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href = "login.html";
    return;
  }

  // Load balance
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    const data = snap.data();
    document.getElementById("balance").innerText =
      "$" + (data.balance || 0);
  }

  // 🔥 LOAD TRANSACTION HISTORY (FIXED)
  const q = query(
    collection(db,"transactions"),
    where("userId","==",user.uid)
  );

  onSnapshot(q,(snapshot)=>{
    let box = document.getElementById("history");
    box.innerHTML = "";

    snapshot.forEach(doc=>{
      let d = doc.data();

      let color = d.type === "deposit" ? "lightgreen" : "#ff6b6b";

      box.innerHTML += `
        <div style="background:#111827; padding:10px; margin:10px; border-radius:8px;">
          <b style="color:${color};">${d.type.toUpperCase()}</b><br>
          Amount: $${d.amount}<br>
          ${d.wallet ? "Wallet: "+d.wallet+"<br>" : ""}
          <small>${new Date(d.time).toLocaleString()}</small>
        </div>
      `;
    });
  });

});

// LOGOUT
window.logout = function(){
  signOut(auth);
  location.href = "login.html";
};

window.goDeposit = function(){
  location.href = "deposit.html";
};

window.goWithdraw = function(){
  location.href = "withdraw.html";
};

</script>
<script>

const translations = {

// CHANGE LANGUAGE
function changeLanguage(lang){
  document.querySelectorAll("[data-key]").forEach(el=>{
    const key = el.getAttribute("data-key");
    if(translations[lang] && translations[lang][key]){
      el.innerText = translations[lang][key];
    }
  });

  localStorage.setItem("lang", lang);
}

// LOAD LANGUAGE ON PAGE LOAD
window.onload = function(){
  const savedLang = localStorage.getItem("lang") || "en";
  changeLanguage(savedLang);
};

</script>
</body>
</html>
