<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Dashboard</title>

<style>
*{
  box-sizing: border-box;
}

html, body{
  margin:0;
  padding:0;
  overflow-x:hidden;
}

body{
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
}

.container{
  padding:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

.balance{
  color:#00ff9d;
  font-size:40px;
}

.actions{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.deposit{
  background:#00e676;
  color:#000;
}

.withdraw{
  background:#ff5252;
  color:#fff;
}

.wallet-address,
.transaction-card,
.history-box,
div{
  word-break: break-word;
  overflow-wrap: break-word;
}
</style>
</head>

<body>

<div class="header">
  <h2>Investor Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <h2 id="welcome">Welcome</h2>

  <div class="card">
    <p>Your Balance</p>

    <div id="balance" class="balance">$0</div>

    <div class="actions">
      <button class="btn deposit" onclick="goDeposit()">Deposit</button>
      <button class="btn withdraw" onclick="goWithdraw()">Withdraw</button>
    </div>

    <h3 style="margin-top:30px;">Transaction History</h3>
    <div id="history"></div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getAuth, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc, 
  updateDoc, 
  collection, 
  query, 
  where, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.appspot.com",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};

// ✅ INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ PLAN RATES
const plans = {
  bronze: 0.02,
  silver: 0.05,
  gold: 0.1
};

// ✅ MAIN
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    location.href = "login.html";
    return;
  }

  const userRef = doc(db, "users", user.uid);

  // 🔥 LOAD USER DATA
  let snap = await getDoc(userRef);

  if (!snap.exists()) return;

  let data = snap.data();

  // ✅ SHOW NAME (USERNAME FIRST)
  let displayName = data.name || user.email.split("@")[0];
  document.getElementById("welcome").innerText =
    "Welcome, " + displayName;

  // ✅ SHOW BALANCE
  document.getElementById("balance").innerText =
    "$" + (data.balance || 0);

  // 🔥 ENSURE lastUpdate EXISTS
  if (!data.lastUpdate) {
    await updateDoc(userRef, {
      lastUpdate: Date.now()
    });
  }

  // ==========================
  // 🚀 MINING SYSTEM (AUTO)
  // ==========================
  setInterval(async () => {

    const freshSnap = await getDoc(userRef);
    const freshData = freshSnap.data();

    const now = Date.now();
    const last = freshData.lastUpdate || now;

    const hours = (now - last) / (1000 * 60 * 60);
    const rate = plans[freshData.plan] || 0;

    const earned =
      (freshData.balance || 0) * rate * (hours / 24);

    if (earned > 0) {

      const newProfit =
        (freshData.profit || 0) + earned;

      await updateDoc(userRef, {
        profit: newProfit,
        lastUpdate: now
      });

      // 🔄 UPDATE UI LIVE
      document.getElementById("balance").innerText =
        "$" + freshData.balance;

    }

  }, 10000); // every 10 seconds

  // ==========================
  // 📜 TRANSACTIONS
  // ==========================
  const q = query(
    collection(db, "transactions"),
    where("userId", "==", user.uid)
  );

  onSnapshot(q, (snapshot) => {
    let box = document.getElementById("history");
    box.innerHTML = "";

    snapshot.forEach((docItem) => {
      let d = docItem.data();

      let color =
        d.type === "deposit"
          ? "lightgreen"
          : "#ff6b6b";

      box.innerHTML += `
        <div style="background:#0b0f1a; padding:10px; margin:10px 0; border-radius:8px;">
          <b style="color:${color};">${d.type.toUpperCase()}</b><br>
          Amount: $${d.amount}<br>
          ${d.wallet ? "Wallet: " + d.wallet + "<br>" : ""}
          <small>${new Date(d.time).toLocaleString()}</small>
        </div>
      `;
    });

  });

});

// ✅ LOGOUT
window.logout = function(){
  signOut(auth);
  location.href = "login.html";
};

// ✅ NAVIGATION
window.goDeposit = function(){
  location.href = "deposit.html";
};

window.goWithdraw = function(){
  location.href = "withdraw.html";
};

</script>

</body>
       </html>
