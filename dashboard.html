<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111827;
}

.container{padding:20px;}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

.balance{color:#00ff9d;font-size:40px;}
.profit{color:gold;font-size:30px;}

.actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.deposit{background:#00e676;color:#000;}
.withdraw{background:#ff5252;color:#fff;}
</style>
</head>

<body>

<div class="header">
  <h2>Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <h2 id="welcome">Welcome</h2>

  <div class="card">

    <p>Balance</p>
    <div id="balance" class="balance">$0</div>

    <p>Profit</p>
    <div id="profit" class="profit">$0</div>

    <div class="actions">
      <button class="btn deposit" onclick="goDeposit()">Deposit</button>
      <button class="btn withdraw" onclick="goWithdraw()">Withdraw</button>
    </div>

    <h3 style="margin-top:30px;">Transactions</h3>
    <div id="history"></div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  collection,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.appspot.com",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const plans = {
  starter: { rate: 0.025, duration: 7 },
  silver: { rate: 0.035, duration: 7 },
  gold: { rate: 0.045, duration: 7 },
  platinum: { rate: 0.055, duration: 7 },
  vip: { rate: 0.066, duration: 7 }
};

let miningRunning = false;

async function runMining(userRef){

  const snap = await getDoc(userRef);
  if(!snap.exists()) return;

  const data = snap.data();

  let invested = Number(data.invested) || 0;
  let profit = Number(data.profit) || 0;

  if(!invested || !data.plan) return;

  const plan = plans[data.plan];
  if(!plan) return;
  
  let rate = plan.rate;

  let start = Number(data.startTime);
  let last = Number(data.lastUpdate) || Date.now();
  let now = Date.now();

  // ⛔ STOP AFTER PLAN ENDS
  let totalDays = (now - start) / (1000 * 60 * 60 * 24);
  if(totalDays >= plan.duration) return;

  let hours = (now - last) / (1000 * 60 * 60);
  if(hours <= 0) return;

  let earned = invested * rate * (hours / 24);

  if(!isFinite(earned) || earned <= 0) return;

  await updateDoc(userRef,{
    profit: profit + earned,
    lastUpdate: now
  });

  console.log("MINED:", earned);
}
   STARTTARTTART LOOP
function startMining(user){

  if(miningRunning) return;
  miningRunning = true;

  const userRef = doc(db,"users",user.uid);

  // run immediately
  runMining(userRef);

  // then every 60s
  setInterval(()=>{
    runMining(userRef);
  },60000);
}

// AUTH
onAuthStateChanged(auth, async (user)=>{

  if(!user){
    location.href="login.html";
    return;
  }

  const userRef = doc(db,"users",user.uid);

  // NAME
  const snap = await getDoc(userRef);
  if(!snap.exists()) return;

  let data = snap.data();
  let name = data.name || user.email.split("@")[0];

  document.getElementById("welcome").innerText =
    "Welcome, " + name;

  // ✅ REALTIME UI
  onSnapshot(userRef,(docSnap)=>{

    let d = docSnap.data();

    let balance = Number(d.balance) || 0;
    let profit = Number(d.profit) || 0;

    document.getElementById("balance").innerText =
      "$" + balance.toFixed(2);

    document.getElementById("profit").innerText =
      "$" + profit.toFixed(2);
  });

  // START MINING
  startMining(user);

  // TRANSACTIONS
  const q = query(
    collection(db,"transactions"),
    where("userId","==",user.uid)
  );

  onSnapshot(q,(snapshot)=>{
    let box = document.getElementById("history");
    box.innerHTML="";

    snapshot.forEach((docItem)=>{

      let d = docItem.data();

      let color = d.type === "deposit"
        ? "lightgreen"
        : "#ff6b6b";

      box.innerHTML += `
        <div style="background:#0b0f1a;padding:10px;margin:10px 0;border-radius:8px;">
          <b style="color:${color};">${d.type.toUpperCase()}</b><br>
          Amount: $${Number(d.amount).toFixed(2)}<br>
          ${d.wallet ? "Wallet: " + d.wallet + "<br>" : ""}
          <small>${new Date(d.time).toLocaleString()}</small>
        </div>
      `;
    });
  });

});

// ACTIONS
window.logout = function(){
  signOut(auth);
  location.href="login.html";
};

window.goDeposit = function(){
  location.href="deposit.html";
};

window.goWithdraw = function(){
  location.href="withdraw.html";
};

</script>

</body>
</html>
