<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Dashboard</title><style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
}

.container{
  padding:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

.balance{
  color:#00ff9d;
  font-size:40px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:8px;
  width:45%;
  font-size:16px;
  cursor:pointer;
}

.deposit{
  background:#00ff9d;
  color:black;
}

.withdraw{
  background:#ff4d4d;
  color:white;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}
</style></head><body><div class="header">
  <h2>Investor Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div><div class="container">  <h2 id="welcome">Welcome</h2>  <div class="card">
    <p>Your Balance</p>
    <h1 class="balance" id="balance">$0</h1>
  </div>  <div class="actions">
    <div class="actions">
  <button class="btn deposit" onclick="goDeposit()">Deposit</button>
  <button class="btn withdraw" onclick="goWithdraw()">Withdraw</button>
</div>
    
    <h3 style="margin-top:30px;">Transaction History</h3>

<div id="history"></div>
  </div></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6",
  measurementId: "G-MYXX49TZLW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOAD USER DATA
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href = "login.html";
    return;
  }

  document.getElementById("welcome").innerText = "Welcome, " + user.email.split("@")[0];

  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    let data = snap.data();
    document.getElementById("balance").innerText = "$" + (data.balance || 0);
  }
});

// LOGOUT
window.logout = function(){
  signOut(auth);
  location.href = "login.html";
};
window.goDeposit = function(){
  window.location.href = "deposit.html";
};
// ✅ WITHDRAW NAVIGATION
window.goWithdraw = function(){
  window.location.href = "withdraw.html";
  
};
import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 LOAD HISTORY
onAuthStateChanged(auth,(user)=>{
  if(!user) return;

  const q = query(
    collection(db,"transactions"),
    where("userId","==",user.uid)
  );

  onSnapshot(q,(snap)=>{
    let box = document.getElementById("history");
    box.innerHTML = "";

    snap.forEach(doc=>{
      let d = doc.data();

      let color = d.type === "deposit" ? "lightgreen" : "#ff6b6b";

      box.innerHTML += `
        <div style="background:#111827; padding:10px; margin:10px; border-radius:8px;">
          <b style="color:${color};">${d.type.toUpperCase()}</b><br>
          Amount: $${d.amount}<br>
          ${d.wallet ? "Wallet: "+d.wallet+"<br>" : ""}
          <small>${new Date(d.time).toLocaleString()}</small>
        </div>
      `;
    });

  });

});
</script></body>
</html>
