<!DOCTYPE html><html>
<head>
<title>User Dashboard</title>
</head>
<body style="background:#0b0f1a;color:white;padding:20px;"><h2>Investor Dashboard</h2><div id="app"></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6",
  measurementId: "G-MYXX49TZLW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  let ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);
  let data = snap.data() || {};

  showDashboard(user,data);
});

function showDashboard(user,data){
  document.getElementById("app").innerHTML = `
    <h3>Welcome, ${user.email}</h3>
    <h2>$${data.balance || 0}</h2>

    <button onclick="showWithdraw()">Withdraw</button>
  `;
}

window.showWithdraw = ()=>{
  document.getElementById("app").innerHTML = `
    <h2>Withdraw</h2>

    <input id="wallet" placeholder="Wallet"><br><br>
    <input id="amount" placeholder="Amount"><br><br>

    <button onclick="submitWithdraw()">Submit</button>
    <br><br>
    <button onclick="location.reload()">Back</button>
  `;
};

window.submitWithdraw = async ()=>{
  let user = auth.currentUser;
  let amount = Number(document.getElementById("amount").value);

  let ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);
  let data = snap.data();

  if(amount > data.balance){
    alert("Insufficient balance");
    return;
  }

  await updateDoc(ref,{
    balance: data.balance - amount
  });

  await addDoc(collection(db,"withdrawals"),{
    email: user.email,
    amount: amount,
    status: "pending"
  });

  alert("Withdraw submitted");
  location.reload();
};

</script></body>
</html>
