<!DOCTYPE html>
<html>
<head>
  <title>Withdrawals</title>
</head>
<body>

<h1>Withdrawal Requests</h1>

<div id="withdrawList"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
authDomain: "stargicinvestment.firebaseapp.com",
projectId: "stargicinvestment",
storageBucket: "stargicinvestment.firebasestorage.app",
messagingSenderId: "1053305294931",
appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

window.withdraw = async function(){

let amount = Number(document.getElementById("amount").value);
let wallet = document.getElementById("wallet").value;

if(!wallet){
alert("Enter your wallet address");
return;
}

if(!amount || amount <= 0){
alert("Enter withdrawal amount");
return;
}

const user = auth.currentUser;

if(!user){
alert("Login first");
return;
}

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);
const data = snap.data();

let balance = data.balance || 0;

if(amount > balance){
alert("Insufficient balance");
return;
}

let newBalance = balance - amount;

await updateDoc(ref,{
balance:newBalance
});

await addDoc(collection(db,"withdrawals"),{
uid:user.uid,
email:data.email,
amount:amount,
wallet:wallet,
status:"Pending",
date:Date.now()
});

alert("Withdrawal request submitted");

location.href="dashboard.html";

}

</script>
</body>
</html>
