<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw</title><style>
body{
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:100px;
}

input{
  padding:10px;
  width:250px;
  margin:10px;
}

button{
  padding:10px 20px;
  background:#ff4d4d;
  border:none;
  cursor:pointer;
  color:white;
}
</style></head><body><h2>Withdraw</h2><input type="text" id="wallet" placeholder="Enter wallet address"><br>
<input type="number" id="amount" placeholder="Enter amount"><br>

<button onclick="withdraw()">Confirm Withdraw</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, updateDoc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6",
  measurementId: "G-MYXX49TZLW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{
  if(!user){
    location.href = "login.html";
  }else{
    currentUser = user;
  }
});

window.withdraw = async function(){

  let wallet = document.getElementById("wallet").value;
  let amount = Number(document.getElementById("amount").value);

  if(!wallet || !amount) return alert("Fill all fields");

  const ref = doc(db,"users",currentUser.uid);
  const snap = await getDoc(ref);

  let currentBalance = snap.data().balance || 0;

  if(amount > currentBalance){
    return alert("Insufficient balance");
  }

  // deduct balance
  await updateDoc(ref,{
    balance: currentBalance - amount
  });

  // save history
  await addDoc(collection(db,"transactions"),{
    userId: currentUser.uid,
    email: currentUser.email,
    type: "withdraw",
    amount: amount,
    wallet: wallet,
    time: Date.now()
  });

  alert("Withdrawal successful");

  window.location.href = "dashboard.html";
};

</script>

</body>
</html>
