<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw</title><style>
body{
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:100px;
}

input{
  padding:10px;
  width:250px;
  margin:10px;
}

button{
  padding:10px 20px;
  background:#ff4d4d;
  border:none;
  cursor:pointer;
  color:white;
}
</style></head><body><h2>Withdraw</h2><input type="text" id="wallet" placeholder="Enter wallet address"><br>
<input type="number" id="amount" placeholder="Enter amount"><br>

<button onclick="withdraw()">Confirm Withdraw</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, updateDoc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6",
  measurementId: "G-MYXX49TZLW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{
  if(!user){
    location.href = "login.html";
  }else{
    currentUser = user;
  }
});

window.withdraw = async function(){

  const user = auth.currentUser;
  if(!user) return;

  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);
  if(!snap.exists()) return;

  let data = snap.data();

  let inputAmount = document.getElementById("amount").value;
  let amount = Number(inputAmount);

  if(!amount || amount <= 0){
    alert("Enter valid amount");
    return;
  }

  let now = Date.now();

  // ✅ safe fallback (prevents bugs)
  let profitStart = Number(data.profitStart) || now;
  let depositStart = Number(data.depositStart) || now;

  let profitDays = (now - profitStart) / (1000 * 60 * 60 * 24);
  let depositDays = (now - depositStart) / (1000 * 60 * 60 * 24);

  let totalProfit = Number(data.profit) || 0;
  let balance = Number(data.balance) || 0;

  let availableProfit = 0;

  if(profitDays >= 7){
    availableProfit = totalProfit;
  }

  // ❌ BEFORE 21 DAYS → ONLY PROFIT
  if(depositDays < 21){

    if(amount > availableProfit){
      alert("Only available profit can be withdrawn before 21 days");
      return;
    }

    await updateDoc(userRef,{
      profit: totalProfit - amount
    });

  }

  // ✅ AFTER 21 DAYS → FULL ACCESS
  else {

    let totalAvailable = totalProfit + balance;

    if(amount > totalAvailable){
      alert("Insufficient funds");
      return;
    }

    let newProfit = totalProfit;
    let newBalance = balance;

    if(amount <= totalProfit){
      newProfit -= amount;
    } else {
      let remaining = amount - totalProfit;
      newProfit = 0;
      newBalance -= remaining;
    }

    await updateDoc(userRef,{
      profit: newProfit,
      balance: newBalance
    });

  }

  alert("Withdrawal successful!");

};
  

</script>

</body>
</html>
