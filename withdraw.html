</style></head><body><nav><div class="logo">StargicInvestment</div><div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="deposit.html">Deposit</a>
<a href="withdraw.html">Withdraw</a>
</div></nav><div class="container"><h2>Withdraw Funds</h2><div class="card"><label>Amount</label>
<input id="amount" type="number" placeholder="Enter withdrawal amount">

<label>Crypto Currency</label>
<select id="coin">

<option>Bitcoin (BTC)</option>
<option>Tether (USDT)</option>
<option>Ethereum (ETH)</option>
</select><label>Your Wallet Address</label>
<input id="wallet" placeholder="Enter wallet address">

<button onclick="withdraw()">Submit Withdrawal</button>

</div><div class="history"><h3>Withdrawal History</h3><div id="history"></div></div></div><footer>Support Email
<br><br>

stargicinvestment987@gmail.com

<br><br>

© 2026 StargicInvestment. All Rights Reserved.

</footer><script>

let balance = parseFloat(localStorage.getItem("balance")) || 0;
let history = JSON.parse(localStorage.getItem("withdrawHistory")) || [];

function withdraw(){

let amount = parseFloat(document.getElementById("amount").value);
let coin = document.getElementById("coin").value;
let wallet = document.getElementById("wallet").value;

let total = parseFloat(localStorage.getItem("totalBalance")) || 0;

if(amount > total){
alert("Insufficient balance");
return;
}

total -= amount;

localStorage.setItem("totalBalance", total);

history.push({
amount: amount,
coin: coin,
wallet: wallet,
date: new Date().toLocaleString()
});

localStorage.setItem("withdrawHistory", JSON.stringify(history));

alert("Withdrawal request submitted");

loadHistory();
}

function loadHistory(){

let box = document.getElementById("history");

box.innerHTML="";

history.forEach(item=>{

box.innerHTML += `
<div class="item">
$${item.amount} - ${item.coin} <br>
${item.date}
</div>
`;

});

}

loadHistory();

</script></body>
