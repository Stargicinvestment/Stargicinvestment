<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Stargicinvestment</title>

<style>

body{
background:#0b0f2a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.container{
background:#11163a;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 0 20px rgba(0,255,150,0.2);
}

h2{
text-align:center;
margin-bottom:25px;
color:#00ff9d;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
background:#1c214d;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#00ff9d;
border:none;
border-radius:5px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.links{
margin-top:15px;
text-align:center;
font-size:14px;
}

.links a{
color:#00ff9d;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h2>User Login</h2>

<form action="dashboard.html">

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="links">
<p>Don't have an account? <a href="register.html">Create Account</a></p>
</div>

</div>

</body>
  </html>
