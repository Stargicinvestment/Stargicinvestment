<body style="background:#0b0f1a;color:white;text-align:center;padding-top:100px;">

<h2>Login</h2>

<input id="email" type="email" placeholder="Enter Email" style="padding:10px;width:250px;"><br><br>

<input id="password" type="password" placeholder="Enter Password" style="padding:10px;width:250px;"><br><br>

<button onclick="login()">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6",
  measurementId: "G-MYXX49TZLW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ LOGIN FUNCTION
window.login = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Enter email and password");
    return;
  }

  try{
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const ADMIN_EMAIL = "eoluka864@gmail.com";

    if(user.email === ADMIN_EMAIL){
      window.location.href = "admin.html";
    }else{
      window.location.href = "dashboard.html";
    }

  }catch(error){
    alert(error.message);
  }

};

// CHANGE LANGUAGE
function changeLanguage(lang){
  document.querySelectorAll("[data-key]").forEach(el=>{
    const key = el.getAttribute("data-key");
    if(translations[lang] && translations[lang][key]){
      el.innerText = translations[lang][key];
    }
  });

  localStorage.setItem("lang", lang);
}

// LOAD LANGUAGE ON PAGE LOAD
window.onload = function(){
  const savedLang = localStorage.getItem("lang") || "en";
  changeLanguage(savedLang);
};

</script>
