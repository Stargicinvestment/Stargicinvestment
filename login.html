<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - StargicInvestment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0b0f1a;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:#00ff9d;
}

.login-box{
background:#111827;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
outline:none;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#00ff9d;
border:none;
border-radius:5px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

a{
color:#9ca3af;
font-size:13px;
display:block;
margin-top:15px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Investor Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

<a href="register.html">Create account</a>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


document.getElementById("loginBtn").onclick = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;


signInWithEmailAndPassword(auth, email, password)

.then((userCredential) => {

window.location.href = "dashboard.html";

})

.catch((error) => {

if(error.code === "auth/user-not-found"){
alert("This email is not registered yet.");
}

else if(error.code === "auth/wrong-password"){
alert("Wrong password.");
}

else if(error.code === "auth/invalid-email"){
alert("Invalid email format.");
}

else{
alert(error.message);
}

});

};

</script>

</body>
  </html>
