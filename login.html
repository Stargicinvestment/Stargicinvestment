<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
</head><body style="background:#0b0f1a;color:white;text-align:center;padding-top:100px;"><h2>Login</h2><input id="email" type="email" placeholder="Enter Email" style="padding:10px;width:250px;"><br><br>
<input id="password" type="password" placeholder="Enter Password" style="padding:10px;width:250px;"><br><br>

<button onclick="login()" style="padding:10px 20px;background:#00ff9d;border:none;cursor:pointer;">
Login
</button><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6",
  measurementId: "G-MYXX49TZLW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(!email || !password){
    alert("Enter email and password");
    return;
  }

  try{

    await signInWithEmailAndPassword(auth, email, password);

    // ✅ ADMIN CHECK
    if(email === "eoluka864@gmail.com"){
      window.location.href = "admin.html";
    } else {
      window.location.href = "dashboard.html";
    }

  }catch(err){
    alert(err.message);
  }
};

</script></body>
</html>
