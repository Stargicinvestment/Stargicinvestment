<!DOCTYPE html><html>
<head>
<title>Login</title>
</head>
<body style="background:black;color:white;text-align:center;padding-top:100px;"><h2>Login</h2><input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6",
  measurementId: "G-MYXX49TZLW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const ADMIN_EMAIL = "eoluka864@gmail.com";

window.login = async ()=>{
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  try{
    let user = await signInWithEmailAndPassword(auth,email,pass);

    if(user.user.email === ADMIN_EMAIL){
      location.href="admin.html";
    }else{
      location.href="index.html";
    }

  }catch(e){
    alert(e.message);
  }
};

</script></body>
</html>
