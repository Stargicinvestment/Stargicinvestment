<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#111827;
  padding:30px;
  border-radius:10px;
  width:300px;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
button{
  width:100%;
  padding:10px;
  background:#00ff9d;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 YOUR FIREBASE CONFIG
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6",
  measurementId: "G-MYXX49TZLW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 ADMIN EMAIL
const ADMIN_EMAIL = "eoluka864@gmail.com";

// =======================
// LOGIN FUNCTION
// =======================
window.login = async function(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try{
    let userCred = await signInWithEmailAndPassword(auth, email, password);
    console.log("Login success:", userCred.user.email);
    alert("Login successful");
  }catch(e){
    console.error(e);
    alert(e.message); // 🔥 THIS WILL SHOW THE REAL ERROR
  }
};

// =======================
// REDIRECT AFTER LOGIN
// =======================
onAuthStateChanged(auth, (user)=>{
  if(user){

    if(user.email === ADMIN_EMAIL){
      // ✅ ADMIN
      window.location.href = "admin.html";
    }else{
      // ✅ NORMAL USER
      window.location.href = "dashboard.html";
    }

  }
});

</script>

</body>
</html>
