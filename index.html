<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.appspot.com",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};

// ✅ INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ==========================
// ✅ AUTH CHECK
// ==========================
onAuthStateChanged(auth,(user)=>{

  if(user){
    console.log("User logged in:", user.email);
    loadMessages(user);
  }else{
    console.log("No user logged in");
  }

});

// ==========================
// ✅ LOAD USER MESSAGES
// ==========================
function loadMessages(user){

  const q = query(collection(db, "messages"), where("userId","==",user.uid));

  onSnapshot(q,(snapshot)=>{

    const box = document.getElementById("chatMessages");
    box.innerHTML = "";

    snapshot.forEach(doc=>{
      let data = doc.data();

      box.innerHTML += `
        <div>You: ${data.text}</div>
        <div style="color:lime;">Admin: ${data.reply || "Waiting..."}</div><br>
      `;
    });

  });

}

// ==========================
// ✅ SEND MESSAGE
// ==========================
window.sendMessage = async function(){

  const user = auth.currentUser;

  if(!user){
    alert("Please login first");
    return;
  }

  let input = document.getElementById("chatInput");
  let message = input.value;

  if(message.trim() === "") return;

  try{
    await addDoc(collection(db, "messages"), {
      text: message,
      userId: user.uid,
      email: user.email,
      time: Date.now(),
      reply: ""
    });

    input.value = "";

  }catch(e){
    alert("Error sending message");
  }
};

// ==========================
// ✅ CHAT BUTTON CLICK (FIXED)
// ==========================
document.getElementById("chatButton").addEventListener("click", ()=>{
  const popup = document.getElementById("chatPopup");

  if(popup.style.display === "block"){
    popup.style.display = "none";
  }else{
    popup.style.display = "block";
  }
});

</script>

// CHANGE LANGUAGE
function changeLanguage(lang){
  document.querySelectorAll("[data-key]").forEach(el=>{
    const key = el.getAttribute("data-key");
    if(translations[lang] && translations[lang][key]){
      el.innerText = translations[lang][key];
    }
  });

  localStorage.setItem("lang", lang);
}

// LOAD LANGUAGE ON PAGE LOAD

  const savedLang = localStorage.getItem("lang") || "en";
  changeLanguage(savedLang);
