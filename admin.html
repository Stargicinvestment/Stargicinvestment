// ======================
// AUTO MINING FUNCTION
// ======================
function calculateProfit(data){

  let balance = data.balance || 0;
  let plan = data.plan || 0;

  if(balance <= 0 || plan <= 0) return data.profit || 0;

  let last = data.lastUpdate || Date.now();
  let now = Date.now();

  let diff = now - last;

  let dailyRate = plan / 100;

  let profitPerMs = (balance * dailyRate) / 86400000;

  let newProfit = (data.profit || 0) + (profitPerMs * diff);

  return newProfit;
}

// ======================
// USERS SECTION
// ======================
onSnapshot(collection(db,"users"), async snap=>{

  let box = document.getElementById("users");
  box.innerHTML="";

  for (const d of snap.docs){

    let data = d.data();
    let id = d.id;

    let realProfit = calculateProfit(data);

    // update profit in database
    await updateDoc(doc(db,"users",id),{
      profit: realProfit,
      lastUpdate: Date.now()
    });

    box.innerHTML += `
    <div class="card">
      <b>${data.email}</b><br>
      Balance: $${data.balance || 0}<br>
      Profit: $${realProfit.toFixed(2)}<br>
      Plan: ${data.plan || 0}%<br><br>

      <input id="bal-${id}" placeholder="Add Balance">
      <button onclick="addBalance('${id}',${data.balance||0})">Add Balance</button><br>

      <input id="plan-${id}" placeholder="Set Plan %">
      <button onclick="setPlan('${id}')">Set Plan</button>
    </div>
    `;
  }

});

// Add balance

  if(!val) return;

  await updateDoc(doc(db,"users",id),{
    balance: current + val,
    lastUpdate: Date.now()
  });
};
