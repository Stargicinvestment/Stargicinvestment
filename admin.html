<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.header{
  padding:15px;
  background:#111827;
  display:flex;
  justify-content:space-between;
}

.container{
  padding:15px;
}

.card{
  background:#1f2937;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-top:5px;
}

.edit{background:#22c55e;}
.delete{background:#ef4444;}
</style>

</head>
<body>

<div class="header">
  <h2>Admin Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <div id="status">Checking admin...</div>

  <h3>All Users</h3>
  <div id="usersList"></div>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, doc, getDoc, collection, getDocs, updateDoc, deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// 🔥 YOUR FIREBASE CONFIG (PASTE YOURS HERE)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();


// ✅ CHECK ADMIN
onAuthStateChanged(auth, async (user) => {

  if(!user){
    document.getElementById("status").innerText = "Not logged in";
    return;
  }

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    document.getElementById("status").innerText = "User data not found";
    return;
  }

  const data = snap.data();

  if(!data.admin){
    document.getElementById("status").innerText = "Access Denied ❌";
    return;
  }

  document.getElementById("status").innerText = "Welcome Admin ✅";

  loadUsers();
});


// ✅ LOAD USERS
async function loadUsers(){
  const list = document.getElementById("usersList");

  list.innerHTML = "Loading users...";

  const querySnapshot = await getDocs(collection(db, "users"));

  let html = "";

  querySnapshot.forEach((docSnap) => {

    const u = docSnap.data();
    const id = docSnap.id;

    html += `
      <div class="card">
        <p><b>Email:</b> ${u.email || "N/A"}</p>
        <p><b>Balance:</b> ${u.balance || 0}</p>
        <p><b>Plan:</b> ${u.plan || "None"}</p>

        <input type="number" id="bal-${id}" placeholder="New balance" />

        <br>
        <button class="edit" onclick="updateBalance('${id}')">Update Balance</button>
        <button class="delete" onclick="deleteUser('${id}')">Delete</button>
      </div>
    `;
  });

  list.innerHTML = html;
}


// ✅ UPDATE BALANCE
window.updateBalance = async function(id){
  const input = document.getElementById(`bal-${id}`);
  const value = Number(input.value);

  if(isNaN(value)){
    alert("Enter valid number");
    return;
  }

  await updateDoc(doc(db,"users",id),{
    balance: value
  });

  alert("Balance updated");
  loadUsers();
}


// ✅ DELETE USER
window.deleteUser = async function(id){

  if(!confirm("Delete this user?")) return;

  await deleteDoc(doc(db,"users",id));

  alert("User deleted");
  loadUsers();
}


// ✅ LOGOUT
window.logout = function(){
  signOut(auth);
  location.href = "login.html";
}

</script>

</body>
</html>
