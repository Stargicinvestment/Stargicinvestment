<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

#loginScreen{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#020617;
}

.loginBox{
background:#1e293b;
padding:30px;
border-radius:8px;
text-align:center;
}

input{
padding:10px;
width:200px;
margin-top:10px;
border:none;
border-radius:4px;
}

button{
background:#22c55e;
border:none;
padding:10px 15px;
color:white;
cursor:pointer;
border-radius:4px;
margin-top:10px;
}

.sidebar{
width:220px;
background:#020617;
height:100vh;
position:fixed;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:10px 0;
}

.main{
margin-left:240px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<div id="loginScreen">

<div class="loginBox">

<h2>Admin Login</h2>

<input type="password" id="adminPass" placeholder="Enter password">

<br>

<button onclick="checkPassword()">Login</button>

</div>

</div>


<div id="dashboard" style="display:none;">

<div class="sidebar">

<h2>Admin</h2>

<a href="#">Dashboard</a>
<a href="#">Users</a>
<a href="#">Deposits</a>
<a href="#">Withdrawals</a>
<a href="#">Settings</a>

</div>

<div class="main">

<div class="card">
<h3>Total Users: <span id="totalUsers">0</span></h3>
</div>

<div class="card">

<h3>Users</h3>

<table>

<thead>
<tr>
<th>Email</th>
<th>Name</th>
<th>Balance</th>
<th>Add Balance</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

</div>

</div>


<script>

function checkPassword(){

const pass = document.getElementById("adminPass").value;

if(pass === "Chukwunonso2020@"){

document.getElementById("loginScreen").style.display="none";
document.getElementById("dashboard").style.display="block";

}else{

alert("Wrong password");

}

}

</script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
authDomain: "stargicinvestment.firebaseapp.com",
projectId: "stargicinvestment",
storageBucket: "stargicinvestment.firebasestorage.app",
messagingSenderId: "1053305294931",
appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const table = document.getElementById("usersTable");

async function loadUsers(){

const snapshot = await getDocs(collection(db,"users"));

document.getElementById("totalUsers").innerText = snapshot.size;

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

const row = document.createElement("tr");

row.innerHTML = `
<td>${data.email}</td>
<td>${data.name}</td>
<td>$${data.balance}</td>
<td><button onclick="addBalance('${docSnap.id}')">Add</button></td>
`;

table.appendChild(row);

});

}

window.addBalance = async function(id){

const amount = prompt("Enter amount");

if(!amount) return;

const ref = doc(db,"users",id);

const snap = await getDoc(ref);

const data = snap.data();

const currentBalance = data.balance || 0;

await updateDoc(ref,{
balance: currentBalance + Number(amount),
planPercent: 5,
planDays: 14,
startDate: Date.now()
});

alert("Balance updated");

location.reload();

}

loadUsers();

</script>

</body>
</html>
