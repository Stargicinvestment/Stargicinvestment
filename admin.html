<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body style="background:black; color:white; font-family:sans-serif;">

<h2>Admin Support Panel</h2>

<!-- ✅ REQUIRED -->
<div id="messages"></div>

<script type="module">

// ✅ IMPORTS (TOP ONLY)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  onSnapshot, 
  doc, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// ✅ YOUR REAL CONFIG (COPY FROM YOUR SITE)
const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment"
};


// ✅ INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ✅ LOAD MESSAGES
onSnapshot(collection(db, "messages"), (snapshot) => {

  const box = document.getElementById("messages");
  box.innerHTML = "";

  snapshot.forEach(docSnap => {

    const data = docSnap.data();
    const id = docSnap.id;

    box.innerHTML += `
      <div style="border:1px solid #444; padding:10px; margin:10px;">
        <b>${data.email}</b><br>
        ${data.text}<br>
        Reply: ${data.reply || "None"}<br><br>

        <input id="reply-${id}" placeholder="Type reply">
        <button onclick="sendReply('${id}')">Reply</button>
      </div>
    `;
  });

});


// ✅ SEND REPLY
window.sendReply = async function(id){

  const input = document.getElementById("reply-" + id);
  const reply = input.value;

  if(reply.trim() === "") return;

  await updateDoc(doc(db, "messages", id), {
    reply: reply
  });

  input.value = "";
};

</script>

</body>
</html>
