<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:20px;
}
.card{
  background:#111827;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
}
button{
  padding:6px;
  background:#00ff9d;
  border:none;
  cursor:pointer;
}
input{
  padding:5px;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>Admin Dashboard</h2>

<div id="app" style="display:none;">

  <h3>Users</h3>
  <div id="users"></div>

  <h3>Withdrawals</h3>
  <div id="withdrawals"></div>

  <h3>Support Messages</h3>
  <div id="messages"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  onSnapshot, 
  doc, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.appspot.com",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ ADMIN EMAIL
const ADMIN_EMAIL = "eoluka864@gmail.com";

// 🔐 PROTECT ADMIN PAGE
onAuthStateChanged(auth,(user)=>{

  if(!user){
    localStorage.setItem("redirectAfterLogin", "admin.html");
    window.location.href = "login.html";
    return;
  }

  const userRef = doc(db,"users",user.uid);
const snap = await getDoc(userRef);

console.log("ADMIN DATA:", snap.data());

  if(user.email !== ADMIN_EMAIL){
    alert("Access denied");
    window.location.href = "dashboard.html";
    return;
  }

  // ✅ SHOW ADMIN PANEL
  document.getElementById("app").style.display = "block";

});

// ======================
// USERS
// ======================
onSnapshot(collection(db,"users"), snap=>{

  let box = document.getElementById("users");
  box.innerHTML="";

  snap.forEach(d=>{
    let data = d.data();
    let id = d.id;

    box.innerHTML += `
    <div class="card">
      <b>${data.email}</b><br>
      Balance: $${data.balance || 0}<br><br>

      <input id="bal-${id}" placeholder="Add Balance">
      <button onclick="addBalance('${id}',${data.balance||0})">Add</button>
    </div>
    `;
  });

});

// ADD BALANCE
window.addBalance = async (id,current)=>{

  let val = Number(document.getElementById("bal-"+id).value);
  if(!val) return;

  await updateDoc(doc(db,"users",id),{
    balance: current + val
  });

};

// ======================
// WITHDRAWALS
// ======================
onSnapshot(collection(db,"withdrawals"), snap=>{

  let box = document.getElementById("withdrawals");
  box.innerHTML="";

  snap.forEach(d=>{
    let data = d.data();
    let id = d.id;

    box.innerHTML += `
    <div class="card">
      ${data.email}<br>
      $${data.amount}<br>
      ${data.status}<br>
      <button onclick="approve('${id}')">Approve</button>
    </div>
    `;
  });

});

window.approve = async (id)=>{
  await updateDoc(doc(db,"withdrawals",id),{
    status:"approved"
  });
};

// ======================
// SUPPORT MESSAGES
// ======================
onSnapshot(collection(db,"messages"), snap=>{

  let box = document.getElementById("messages");
  box.innerHTML="";

  snap.forEach(d=>{
    let data = d.data();
    let id = d.id;

    box.innerHTML += `
    <div class="card">
      <b>${data.email}</b><br>
      ${data.text}<br>
      Reply: ${data.reply || "None"}<br><br>

      <input id="r-${id}" placeholder="Reply">
      <button onclick="reply('${id}')">Send</button>
    </div>
    `;
  });

});

window.reply = async (id)=>{
  let val = document.getElementById("r-"+id).value;
  if(!val) return;

  await updateDoc(doc(db,"messages",id),{
    reply: val
  });
};

</script>
</body>
</html>
