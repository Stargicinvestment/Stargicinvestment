<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
text-align:left;
}

button{
background:#22c55e;
border:none;
padding:8px 12px;
cursor:pointer;
color:white;
border-radius:4px;
}

</style>

</head>

<body>

<h1>Admin Panel</h1>

<table>

<thead>

<tr>
<th>Email</th>
<th>Name</th>
<th>Balance</th>
<th>Add Balance</th>
</tr>

</thead>

<tbody id="usersTable"></tbody>

</table>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
authDomain: "stargicinvestment.firebaseapp.com",
projectId: "stargicinvestment",
storageBucket: "stargicinvestment.firebasestorage.app",
messagingSenderId: "1053305294931",
appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const table = document.getElementById("usersTable");



async function loadUsers(){

const snapshot = await getDocs(collection(db,"users"));

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

const row = document.createElement("tr");

row.innerHTML = `
<td>${data.email}</td>
<td>${data.name}</td>
<td>$${data.balance}</td>
<td><button onclick="addBalance('${docSnap.id}')">Add</button></td>
`;

table.appendChild(row);

});

}


window.addBalance = async function(id){

const amount = prompt("Enter amount to add");

if(!amount) return;

const ref = doc(db,"users",id);

const snap = await getDoc(ref);

const data = snap.data();

const currentBalance = data.balance || 0;

await updateDoc(ref,{
balance: currentBalance + Number(amount),
planPercent: 5,
planDays: 14,
startDate: Date.now()
});

alert("Balance added and mining started");

location.reload();

}


loadUsers();

</script>

</body>

</html>
