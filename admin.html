<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:20px;
}
.card{
  background:#111827;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
}
button{
  padding:6px;
  background:#00ff9d;
  border:none;
  cursor:pointer;
}
input{
  padding:5px;
}
</style>
</head>

<body>

<h2>Admin Dashboard</h2>

<div id="app" style="display:none;">

<h3>Users</h3>
<div id="users"></div>

<h3>Withdrawals</h3>
<div id="withdrawals"></div>

<h3>Support</h3>
<div id="messages"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "eoluka864@gmail.com",
  projectId: "stargicinvestment"
};

const ADMIN_EMAIL="eoluka864@gmail.com";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ======================
// ADMIN PROTECTION
// ======================
onAuthStateChanged(auth,(user)=>{

  if(user === null){
    // ⏳ WAIT — don't block yet
    return;
  }

  if(user.email === "eoluka864@gmail.com"){
    // ✅ ADMIN ALLOWED
    document.getElementById("app").style.display = "block";
  }else{
    // ❌ NOT ADMIN
    alert("Access denied");
    window.location.href = "dashboard.html";
  }

});

// ======================
// REAL AUTO MINING
// ======================
function calculateProfit(data){

  let balance = data.balance || 0;
  let plan = data.plan || 0;

  if(balance <= 0 || plan <= 0) return data.profit || 0;

  let last = data.lastUpdate || Date.now();
  let now = Date.now();

  let diff = now - last;

  let dailyRate = plan / 100;

  let profitPerMs = (balance * dailyRate) / 86400000;

  let newProfit = (data.profit || 0) + (profitPerMs * diff);

  return newProfit;
}

// ======================
// USERS
// ======================
onSnapshot(collection(db,"users"), snap=>{

  let box = document.getElementById("users");
  box.innerHTML="";

  snap.forEach(async d=>{

    let data = d.data();
    let id = d.id;

    let realProfit = calculateProfit(data);

    // 🔥 SAVE UPDATED PROFIT
    await updateDoc(doc(db,"users",id),{
      profit: realProfit,
      lastUpdate: Date.now()
    });

    box.innerHTML += `
    <div class="card">
      <b>${data.email}</b><br>
      Balance: $${data.balance || 0}<br>
      Profit: $${realProfit.toFixed(2)}<br>
      Plan: ${data.plan || 0}%<br><br>

      <input id="bal-${id}" placeholder="Add Balance">
      <button onclick="addBalance('${id}',${data.balance||0})">Add</button><br>

      <input id="plan-${id}" placeholder="Plan %">
      <button onclick="setPlan('${id}')">Set</button>
    </div>
    `;
  });

});

window.addBalance = async (id,current)=>{
  let val = Number(document.getElementById("bal-"+id).value);
  if(!val) return;

  await updateDoc(doc(db,"users",id),{
    balance: current + val,
    lastUpdate: Date.now()
  });
};

window.setPlan = async (id)=>{
  let val = Number(document.getElementById("plan-"+id).value);
  if(!val) return;

  await updateDoc(doc(db,"users",id),{
    plan: val,
    lastUpdate: Date.now()
  });
};

// ======================
// WITHDRAWALS
// ======================
onSnapshot(collection(db,"withdrawals"), snap=>{

  let box = document.getElementById("withdrawals");
  box.innerHTML="";

  snap.forEach(d=>{
    let data = d.data();
    let id = d.id;

    box.innerHTML += `
    <div class="card">
      ${data.email}<br>
      $${data.amount}<br>
      ${data.status}<br>
      <button onclick="approve('${id}')">Approve</button>
    </div>
    `;
  });

});

window.approve = async (id)=>{
  await updateDoc(doc(db,"withdrawals",id),{
    status:"approved"
  });
};

// ======================
// SUPPORT CHAT
// ======================
onSnapshot(collection(db,"messages"), snap=>{

  let box = document.getElementById("messages");
  box.innerHTML="";

  snap.forEach(d=>{
    let data = d.data();
    let id = d.id;

    box.innerHTML += `
    <div class="card">
      <b>${data.email}</b><br>
      ${data.text}<br>
      Reply: ${data.reply || "None"}<br><br>

      <input id="r-${id}" placeholder="Reply">
      <button onclick="reply('${id}')">Send</button>
    </div>
    `;
  });

});

window.reply = async (id)=>{
  let val = document.getElementById("r-"+id).value;
  if(!val) return;

  await updateDoc(doc(db,"messages",id),{
    reply: val
  });
};

</script>

</body>
</html>
