<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<style>

body{
font-family:Poppins;
background:#0b0f1a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#111827;
padding:40px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#00ff9d;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input id="name" placeholder="Full Name">

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="registerBtn">Register</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyDGsQ3Q7JHVvNlKAQi3l5HSZBZrP_fVoBk",
  authDomain: "stargicinvestment.firebaseapp.com",
  projectId: "stargicinvestment",
  storageBucket: "stargicinvestment.firebasestorage.app",
  messagingSenderId: "1053305294931",
  appId: "1:1053305294931:web:87cba3260a83030e56f6a6"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


document.getElementById("registerBtn").onclick = async function(){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;


try{

const userCredential = await createUserWithEmailAndPassword(auth,email,password);

const user = userCredential.user;


await setDoc(doc(db,"users",user.uid),{

name: name,
email: email,
balance: 0

});


alert("Account created successfully");

window.location.href="login.html";

}

catch(error){

alert(error.message);

}

};

</script>

</body>
</html>
